# Dependabot — 依赖版本更新（公开仓库免费，开启后 GitHub Security 可展示依赖告警）
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm 生产依赖
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # 同类依赖合并为一个 PR，减少噪音
      electron:
        patterns:
          - electron
          - electron-vite
          - electron-builder
          - ffmpeg-static
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      types:
        patterns:
          - typescript
          - "@types/*"
      lint-build:
        patterns:
          - tailwindcss
          - postcss
          - autoprefixer
    commit-message:
      prefix: chore(deps)
      include: scope

  # GitHub Actions 工作流依赖
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
      include: scope
